services:
  app:
    build: .
    container_name: safe-kick-app
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    expose:
      - "3000"

  db:
    image: postgres:16
    container_name: safe-kick-db
    restart: always
    environment:
      POSTGRES_DB: cutdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  nginx:
    image: nginx:latest
    container_name: safe-kick-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data: